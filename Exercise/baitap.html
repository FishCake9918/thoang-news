<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý thông tin cá nhân</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="baitap.css">
</head>
<body>
  <div class="container py-4">
    <div class="page-title text-center mb-4">
      <h1>Quản lý thông tin cá nhân</h1>
      <p>Nhập thông tin và thêm vào danh sách bên dưới</p>
    </div>

    <div class="row g-4">
      <!-- FORM -->
      <div class="col-12 col-lg-5">
        <div class="card custom-card shadow-sm">
          <div class="card-body p-4">
            <h2 class="section-title mb-4">Thông tin</h2>

            <div class="mb-3">
              <label for="name" class="form-label">Họ tên</label>
              <input
                type="text"
                id="name"
                class="form-control custom-input"
                placeholder="Nhập họ tên"
              >
            </div>

            <div class="mb-3">
              <label for="year" class="form-label">Năm sinh</label>
              <input
                type="text"
                id="year"
                class="form-control custom-input"
                placeholder="YYYY"
                maxlength="4"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Sở thích</label>
              <div class="hobby-box">
                <div class="form-check mb-2">
                  <input class="form-check-input hobby-check" type="checkbox" value="Thể thao" id="sport">
                  <label class="form-check-label" for="sport">Thể thao</label>
                </div>

                <div class="form-check mb-2">
                  <input class="form-check-input hobby-check" type="checkbox" value="Âm nhạc" id="music">
                  <label class="form-check-label" for="music">Âm nhạc</label>
                </div>

                <div class="form-check">
                  <input class="form-check-input hobby-check" type="checkbox" value="Du lịch" id="travel">
                  <label class="form-check-label" for="travel">Du lịch</label>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <label for="country" class="form-label">Quốc gia</label>
              <select id="country" class="form-select custom-input">
                <option value="">-- Chọn quốc gia --</option>
                <option value="Việt Nam">🇻🇳 Việt Nam</option>
                <option value="Hoa Kỳ">🇺🇸 Hoa Kỳ</option>
                <option value="Nhật Bản">🇯🇵 Nhật Bản</option>
                <option value="Hàn Quốc">🇰🇷 Hàn Quốc</option>
              </select>
            </div>

            <div class="row g-2">
              <div class="col-6">
                <button id="addBtn" class="btn btn-primary custom-btn w-100" type="button">
                  Thêm
                </button>
              </div>
              <div class="col-6">
                <button id="deleteBtn" class="btn btn-danger custom-btn w-100" type="button">
                  Xóa
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- LIST -->
      <div class="col-12 col-lg-7">
        <div class="card custom-card shadow-sm">
          <div class="card-body p-4">
            <div class="list-header mb-3">
              <h2 class="section-title mb-0">Danh sách</h2>
              <span class="count-badge" id="totalCount">Tổng: 0</span>
            </div>

            <input
              type="text"
              id="search"
              class="form-control custom-input mb-3"
              placeholder="🔍 Tìm theo tên..."
            >

            <div class="table-responsive">
              <table class="table custom-table align-middle text-center">
                <thead>
                  <tr>
                    <th>STT</th>
                    <th>Họ tên</th>
                    <th>Năm sinh</th>
                    <th>Sở thích</th>
                    <th>Quốc gia</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr>
                    <td colspan="5" class="empty-text">Chưa có dữ liệu</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <p class="note-text mb-0">Bấm vào một dòng để chọn, sau đó nhấn nút Xóa.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="baitap.js"></script>
</body>
</html>
